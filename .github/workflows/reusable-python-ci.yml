name: Reusable Python CI

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.12"
      uv-version:
        type: string
        default: "0.11.14"
      install-command:
        type: string
        default: "uv sync --locked --all-extras --dev"
      verify-command:
        type: string
        default: "uv run ruff check . && uv run ruff format --check . && uv run pytest"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          version: ${{ inputs['uv-version'] }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install
        env:
          INSTALL_COMMAND: ${{ inputs.install-command }}
        run: bash -euo pipefail -c "$INSTALL_COMMAND"

      - name: Verify
        env:
          VERIFY_COMMAND: ${{ inputs.verify-command }}
        run: bash -euo pipefail -c "$VERIFY_COMMAND"
