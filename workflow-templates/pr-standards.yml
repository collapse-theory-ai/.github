name: PR Standards

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  pull-requests: read

jobs:
  branch-name:
    name: Conventional branch name
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch name
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          branch = os.environ["HEAD_REF"]
          allowed = "build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test"
          pattern = re.compile(rf"^({allowed})/[a-z0-9._/-]+$")

          if branch.startswith("release-please--"):
              sys.exit(0)

          if pattern.match(branch):
              sys.exit(0)

          print("Branch name must start with a conventional prefix.")
          print("Expected: feat/example, fix/example, ci/example, docs/example")
          print(f"Actual: {branch}")
          sys.exit(1)
          PY

  conventional-title:
    name: Conventional PR title
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          title = os.environ["PR_TITLE"]
          allowed_types = "build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test"
          pattern = re.compile(rf"^({allowed_types})(\([a-z0-9._-]+\))?!?: .+")

          if pattern.match(title):
              sys.exit(0)

          print("PR title must follow Conventional Commits.")
          print("Expected: feat: add parser or fix(ci): grant pubsub read")
          print(f"Actual: {title}")
          sys.exit(1)
          PY
