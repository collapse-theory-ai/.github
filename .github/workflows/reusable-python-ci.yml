name: Reusable Python CI

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.12"
      install-command:
        type: string
        default: "uv sync --all-extras --dev"
      verify-command:
        type: string
        default: "uv run ruff check . && uv run ruff format --check . && uv run pytest"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install
        env:
          INSTALL_COMMAND: ${{ inputs.install-command }}
        run: bash -euo pipefail -c "$INSTALL_COMMAND"

      - name: Verify
        env:
          VERIFY_COMMAND: ${{ inputs.verify-command }}
        run: bash -euo pipefail -c "$VERIFY_COMMAND"
