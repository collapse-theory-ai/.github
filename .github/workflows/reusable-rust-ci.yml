name: Reusable Rust CI

on:
  workflow_call:
    inputs:
      toolchain:
        type: string
        default: "stable"
      verify-command:
        type: string
        default: "cargo fmt --check && cargo clippy --all-targets --all-features -- -D warnings && cargo test --all-targets --all-features"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.toolchain }}
          components: rustfmt, clippy

      - name: Verify
        run: ${{ inputs.verify-command }}
