name: Reusable Rust CI

on:
  workflow_call:
    inputs:
      toolchain:
        type: string
        default: "stable"
      verify-command:
        type: string
        default: "cargo fmt --check && cargo clippy --all-targets --all-features -- -D warnings && cargo test --all-targets --all-features"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.toolchain }}
          components: rustfmt, clippy

      - name: Verify
        env:
          VERIFY_COMMAND: ${{ inputs.verify-command }}
        run: bash -euo pipefail -c "$VERIFY_COMMAND"
